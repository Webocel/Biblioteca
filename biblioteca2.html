<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0a;--surface:#161410;--card:#1c1915;--border:#2a2520;--accent:#c8a46e;--accent2:#e8c99a;--text:#e8e0d5;--muted:#7a7060;--tag:#2a2218}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;background:rgba(14,12,10,0.92);backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:2rem}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);white-space:nowrap;flex-shrink:0}
.logo span{font-style:italic;color:var(--accent2)}
.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem .55rem 2.6rem;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.stats{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap}
.stats b{color:var(--accent);font-weight:500}
.filters-bar{border-bottom:1px solid var(--border);padding:0 2rem}
.filters-inner{max-width:1400px;margin:0 auto;display:flex;gap:.5rem;padding:.75rem 0;overflow-x:auto;scrollbar-width:none}
.filter-chip{background:transparent;border:1px solid var(--border);border-radius:100px;padding:.3rem .9rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .18s}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#0e0c0a;font-weight:500}
main{max-width:1400px;margin:0 auto;padding:2rem 2rem 4rem}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400}
.section-count{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.5rem}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .22s,border-color .22s,box-shadow .22s;animation:fadeUp .4s ease both}
.book-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 0 1px var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.book-cover{aspect-ratio:3/4;position:relative;overflow:hidden;background:var(--surface)}
.book-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.book-card:hover .book-cover img{transform:scale(1.04)}
.cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.8rem;font-style:italic;color:var(--muted);text-align:center;padding:1rem;line-height:1.4}
.book-badge{position:absolute;top:.5rem;right:.5rem;background:rgba(14,12,10,.85);border:1px solid var(--border);border-radius:4px;padding:.15rem .4rem;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent);backdrop-filter:blur(4px)}
.book-info{padding:.85rem}
.book-title{font-family:'Playfair Display',serif;font-size:.88rem;line-height:1.35;color:var(--text);margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-author{font-size:.72rem;color:var(--muted);margin-bottom:.6rem;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.75rem}
.tag{background:var(--tag);border:1px solid var(--border);border-radius:4px;padding:.1rem .45rem;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted)}
.btn-download{width:100%;background:var(--accent);border:none;border-radius:6px;padding:.55rem;color:#0e0c0a;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;cursor:pointer;transition:background .18s,transform .12s;display:flex;align-items:center;justify-content:center;gap:.4rem;letter-spacing:.04em}
.btn-download:hover{background:var(--accent2)}
.btn-download:active{transform:scale(.97)}
.btn-download:disabled{background:var(--tag);color:var(--muted);cursor:not-allowed}
.spinner{width:10px;height:10px;border:2px solid var(--muted);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pagination{display:flex;justify-content:center;gap:.5rem;margin-top:3rem;flex-wrap:wrap}
.page-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .9rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .18s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#0e0c0a;font-weight:500}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:560px;width:100%;overflow:hidden;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-top{display:flex;gap:1.5rem;padding:1.5rem}
.modal-cover{width:100px;aspect-ratio:3/4;border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--card)}
.modal-cover img{width:100%;height:100%;object-fit:cover}
.modal-meta{flex:1}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;line-height:1.3;margin-bottom:.4rem}
.modal-author{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:.75rem}
.modal-detail{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);line-height:1.8}
.modal-detail span{color:var(--accent)}
.modal-actions{padding:1rem 1.5rem 1.5rem;display:flex;gap:.75rem}
.btn-primary{flex:1;background:var(--accent);border:none;border-radius:8px;padding:.7rem;color:#0e0c0a;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;cursor:pointer;transition:background .18s}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:transparent;border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer;transition:border-color .18s,color .18s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:.65rem 1.25rem;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);z-index:300;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.skeleton-cover{aspect-ratio:3/4}
.skeleton-body{padding:.85rem;display:flex;flex-direction:column;gap:.5rem}
.skeleton-line{height:12px}
.skeleton-btn{height:34px;margin-top:.25rem}
.empty{text-align:center;padding:5rem 1rem;color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;grid-column:1/-1}
.error-msg{text-align:center;padding:3rem 1rem;color:#e07070;font-family:'DM Mono',monospace;font-size:.82rem;line-height:1.8;grid-column:1/-1}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">Biblio<span>teca</span></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar por título o autor…">
    </div>
    <div class="stats"><b id="totalCount">…</b> libros</div>
  </div>
</header>
<div class="filters-bar">
  <div class="filters-inner" id="filters">
    <button class="filter-chip active" data-cat="">Todos</button>
  </div>
</div>
<main>
  <div class="section-header">
    <h2 class="section-title">Colección</h2>
    <span class="section-count" id="sectionCount">cargando…</span>
  </div>
  <div class="books-grid" id="booksGrid"></div>
  <div class="pagination" id="pagination"></div>
</main>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-cover"><img id="modalCover" src="" alt=""></div>
      <div class="modal-meta">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-author" id="modalAuthor"></div>
        <div class="modal-detail">Formato: <span>CBR</span><br>Tamaño: <span id="modalSize"></span><br>Descargas: <span id="modalDl"></span></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="modalDownload">↓ Descargar CBR</button>
      <button class="btn-secondary" id="modalClose">Cerrar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API="https://biblioteca-production-0015.up.railway.app";
let state={page:1,query:"",category:"",total:0,pages:1};
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}
function formatSize(b){if(!b)return"—";const m=b/1024/1024;return m<1?Math.round(b/1024)+" KB":m.toFixed(1)+" MB"}
function coverUrl(b){return b.cover_msg_id?`${API}/api/cover/${b.cover_msg_id}`:null}
function renderSkeletons(n=12){document.getElementById("booksGrid").innerHTML=Array(n).fill(0).map(()=>`<div class="skeleton-card"><div class="skeleton-cover skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton" style="width:80%"></div><div class="skeleton-line skeleton" style="width:55%"></div><div class="skeleton-btn skeleton"></div></div></div>`).join("")}
function renderBooks(books){
  const grid=document.getElementById("booksGrid");
  if(!books.length){grid.innerHTML='<div class="empty">No se encontraron libros…</div>';return}
  grid.innerHTML=books.map((b,i)=>{
    const cover=coverUrl(b);
    return`<div class="book-card" data-id="${b.id}" style="animation-delay:${i*.025}s">
      <div class="book-cover">
        ${cover?`<img src="${cover}" alt="" loading="lazy" onerror="this.outerHTML='<div class=cover-placeholder>${b.title.replace(/'/g,"&#39;")}</div>'">`:`<div class="cover-placeholder">${b.title}</div>`}
        <div class="book-badge">CBR</div>
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author||'Autor desconocido'}</div>
        <div class="book-tags"><span class="tag">${formatSize(b.file_size)}</span>${b.downloads?`<span class="tag">↓ ${b.downloads}</span>`:''}</div>
        <button class="btn-download" data-id="${b.id}" data-title="${b.title.replace(/"/g,'&quot;')}">↓ Descargar</button>
      </div>
    </div>`;
  }).join("");
  grid.querySelectorAll(".book-card").forEach(c=>c.addEventListener("click",e=>{if(e.target.closest(".btn-download"))return;openModal(+c.dataset.id)}));
  grid.querySelectorAll(".btn-download").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();triggerDownload(+b.dataset.id,b.dataset.title,b)}));
}
function renderPagination(){
  const{page,pages}=state;const el=document.getElementById("pagination");
  if(pages<=1){el.innerHTML="";return}
  let nums=[];
  if(pages<=7)nums=Array.from({length:pages},(_,i)=>i+1);
  else{nums=[1];if(page>3)nums.push("…");for(let i=Math.max(2,page-1);i<=Math.min(pages-1,page+1);i++)nums.push(i);if(page<pages-2)nums.push("…");nums.push(pages)}
  el.innerHTML=`<button class="page-btn" ${page===1?"disabled":""} data-p="${page-1}">← Ant</button>${nums.map(n=>n==="…"?`<span class="page-btn" style="cursor:default">…</span>`:`<button class="page-btn ${n===page?"active":""}" data-p="${n}">${n}</button>`).join("")}<button class="page-btn" ${page===pages?"disabled":""} data-p="${page+1}">Sig →</button>`;
  el.querySelectorAll("[data-p]").forEach(b=>b.addEventListener("click",()=>{const p=+b.dataset.p;if(p>=1&&p<=pages){state.page=p;loadBooks();window.scrollTo({top:0,behavior:"smooth"})}}));
}
async function loadBooks(){
  renderSkeletons();
  const params=new URLSearchParams({page:state.page,q:state.query,category:state.category});
  try{
    const res=await fetch(`${API}/api/books?${params}`);
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    state.total=data.total;state.pages=data.pages;
    document.getElementById("totalCount").textContent=data.total.toLocaleString();
    const from=((state.page-1)*48)+1,to=Math.min(state.page*48,data.total);
    document.getElementById("sectionCount").textContent=`mostrando ${from}–${to} de ${data.total.toLocaleString()}`;
    renderBooks(data.results);renderPagination();
  }catch(err){document.getElementById("booksGrid").innerHTML=`<div class="error-msg">⚠ No se pudo conectar al servidor.<br><br><small style="color:var(--muted)">${API}</small></div>`}
}
function triggerDownload(id,title,btn){
  if(btn){btn.disabled=true;btn.innerHTML=`<span class="spinner"></span> Descargando…`}
  const a=document.createElement("a");
  a.href=`${API}/api/download/${id}`;
  a.download="";
  a.target="_blank";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast(`Iniciando: ${title}`);
  setTimeout(()=>{if(btn){btn.disabled=false;btn.innerHTML="↓ Descargar"}},3000);
}
async function openModal(id){
  try{
    const res=await fetch(`${API}/api/books/${id}`);const book=await res.json();
    const cover=coverUrl(book);const img=document.getElementById("modalCover");
    img.src=cover||"";img.style.display=cover?"block":"none";
    document.getElementById("modalTitle").textContent=book.title;
    document.getElementById("modalAuthor").textContent=book.author||"Autor desconocido";
    document.getElementById("modalSize").textContent=formatSize(book.file_size);
    document.getElementById("modalDl").textContent=(book.downloads||0).toLocaleString();
    document.getElementById("modalDownload").onclick=()=>{triggerDownload(id,book.title,null);document.getElementById("modalOverlay").classList.remove("open")};
    document.getElementById("modalOverlay").classList.add("open");
  }catch{showToast("Error al cargar el libro")}
}
document.getElementById("modalClose").onclick=()=>document.getElementById("modalOverlay").classList.remove("open");
document.getElementById("modalOverlay").addEventListener("click",e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove("open")});
let searchTimer;
document.getElementById("searchInput").addEventListener("input",e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{state.query=e.target.value.trim();state.page=1;loadBooks()},400)});
async function loadCategories(){
  try{const data=await(await fetch(`${API}/api/stats`)).json();const bar=document.getElementById("filters");
  (data.categories||[]).forEach(cat=>{const btn=document.createElement("button");btn.className="filter-chip";btn.dataset.cat=cat.category;btn.textContent=`${cat.category} (${cat.count.toLocaleString()})`;bar.appendChild(btn)})}catch{}
}
document.getElementById("filters").addEventListener("click",e=>{const chip=e.target.closest(".filter-chip");if(!chip)return;document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active"));chip.classList.add("active");state.category=chip.dataset.cat;state.page=1;loadBooks()});
loadCategories();loadBooks();
</script>
</body>
</html>
