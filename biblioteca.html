<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0a;--surface:#161410;--card:#1c1915;--border:#2a2520;--accent:#c8a46e;--accent2:#e8c99a;--text:#e8e0d5;--muted:#7a7060;--tag:#2a2218}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,#1a1408 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,#12100d 0%,transparent 60%)}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;background:rgba(14,12,10,0.95);backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:2rem}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);white-space:nowrap;flex-shrink:0;cursor:pointer}
.logo span{font-style:italic;color:var(--accent2)}
.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem .55rem 2.6rem;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.stats{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap}
.stats b{color:var(--accent);font-weight:500}

/* NAV CATEGORÍAS */
.nav-bar{border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:99;background:rgba(14,12,10,0.97);backdrop-filter:blur(12px)}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;padding:0 2rem;gap:0}

.nav-item{position:relative}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:.7rem 1rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:.3rem}
.nav-btn:hover,.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn .arrow{font-size:.6rem;transition:transform .2s}
.nav-item:hover .arrow{transform:rotate(180deg)}
.nav-btn.solo.active{color:var(--accent);border-bottom-color:var(--accent)}

/* DROPDOWN */
.dropdown{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:220px;padding:.5rem;box-shadow:0 16px 40px rgba(0,0,0,.6);opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .18s,transform .18s;z-index:200}
.nav-item:hover .dropdown{opacity:1;pointer-events:all;transform:translateY(0)}
.drop-item{display:block;width:100%;background:transparent;border:none;text-align:left;padding:.45rem .75rem;border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.drop-item:hover{background:var(--card);color:var(--accent)}
.drop-item.active{color:var(--accent);background:var(--card)}
.drop-divider{height:1px;background:var(--border);margin:.3rem .5rem}
.drop-label{padding:.3rem .75rem .1rem;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* SUBMENÚ ANIDADO */
.drop-parent{position:relative}
.drop-parent>.drop-item{display:flex;justify-content:space-between;align-items:center}
.drop-parent>.drop-item::after{content:"›";margin-left:.5rem;font-size:.9rem}
.subdropdown{position:absolute;top:0;left:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:240px;padding:.5rem;box-shadow:0 16px 40px rgba(0,0,0,.6);opacity:0;pointer-events:none;transform:translateX(-4px);transition:opacity .15s,transform .15s;z-index:201}
.drop-parent:hover>.subdropdown{opacity:1;pointer-events:all;transform:translateX(0)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:2rem 2rem 4rem}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400}
.section-count{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}

.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem}

/* CARDS */
.book-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .22s,border-color .22s,box-shadow .22s;animation:fadeUp .4s ease both;display:flex;flex-direction:column}
.book-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 0 1px var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.book-cover{aspect-ratio:3/4;position:relative;overflow:hidden;background:var(--surface);flex-shrink:0}
.book-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.book-card:hover .book-cover img{transform:scale(1.04)}
.cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.8rem;font-style:italic;color:var(--muted);text-align:center;padding:1rem;line-height:1.4}
.book-badge{position:absolute;top:.5rem;right:.5rem;background:rgba(14,12,10,.85);border:1px solid var(--border);border-radius:4px;padding:.15rem .4rem;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent);backdrop-filter:blur(4px)}
.vol-count{position:absolute;bottom:.5rem;left:.5rem;background:rgba(14,12,10,.85);border:1px solid var(--accent);border-radius:4px;padding:.15rem .5rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--accent);backdrop-filter:blur(4px)}
.book-info{padding:.85rem;display:flex;flex-direction:column;flex:1}
.book-title{font-family:'Playfair Display',serif;font-size:.88rem;line-height:1.35;color:var(--text);margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.75rem}
.tag{background:var(--tag);border:1px solid var(--border);border-radius:4px;padding:.1rem .45rem;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted)}
.tag.cat{color:var(--accent);border-color:#3a2e1a;background:#221a0e;cursor:pointer;transition:background .15s}
.tag.cat:hover{background:#2e2210;border-color:var(--accent)}

.btn-download{width:100%;background:var(--accent);border:none;border-radius:6px;padding:.55rem;color:#0e0c0a;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;cursor:pointer;transition:background .18s,transform .12s;display:flex;align-items:center;justify-content:center;gap:.4rem;letter-spacing:.04em;margin-top:auto}
.btn-download:hover{background:var(--accent2)}
.btn-download:active{transform:scale(.97)}
.btn-download:disabled{background:var(--tag);color:var(--muted);cursor:not-allowed}

.volumes-list{display:flex;flex-direction:column;gap:.4rem;margin-top:auto}
.vol-item{display:flex;align-items:center;gap:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;transition:border-color .18s}
.vol-item:hover{border-color:var(--accent)}
.vol-title{flex:1;font-size:.72rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vol-btn{background:var(--accent);border:none;border-radius:4px;padding:.25rem .5rem;color:#0e0c0a;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s}
.vol-btn:hover{background:var(--accent2)}
.vol-btn:disabled{background:var(--tag);color:var(--muted);cursor:not-allowed}
.ver-mas{justify-content:center;cursor:pointer;font-size:.72rem;color:var(--muted)}

.spinner{width:10px;height:10px;border:2px solid var(--muted);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:.5rem;margin-top:3rem;flex-wrap:wrap}
.page-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .9rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .18s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#0e0c0a;font-weight:500}
.page-btn:disabled{opacity:.3;cursor:not-allowed}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:600px;width:100%;overflow:hidden;animation:modalIn .25s ease;max-height:90vh;display:flex;flex-direction:column}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-top{display:flex;gap:1.5rem;padding:1.5rem;flex-shrink:0}
.modal-cover{width:110px;aspect-ratio:3/4;border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--card)}
.modal-cover img{width:100%;height:100%;object-fit:cover}
.modal-meta{flex:1;min-width:0}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;line-height:1.3;margin-bottom:.4rem}
.modal-cat{display:inline-block;background:#221a0e;border:1px solid #3a2e1a;border-radius:4px;padding:.15rem .5rem;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent);margin-bottom:.75rem;cursor:pointer}
.modal-cat:hover{border-color:var(--accent)}
.modal-detail{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);line-height:1.8}
.modal-detail span{color:var(--accent)}
.modal-vols{padding:0 1.5rem 1.5rem;overflow-y:auto;flex:1}
.modal-vols-title{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.08em}
.modal-vol-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border:1px solid var(--border);border-radius:8px;margin-bottom:.4rem;transition:border-color .18s}
.modal-vol-item:hover{border-color:var(--accent)}
.modal-vol-num{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);flex-shrink:0;width:24px;text-align:right}
.modal-vol-title{flex:1;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-vol-size{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);flex-shrink:0}
.modal-vol-btn{background:var(--accent);border:none;border-radius:6px;padding:.35rem .7rem;color:#0e0c0a;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;cursor:pointer;flex-shrink:0;transition:background .15s}
.modal-vol-btn:hover{background:var(--accent2)}
.modal-vol-btn:disabled{background:var(--tag);color:var(--muted);cursor:not-allowed}
.modal-close-row{padding:.75rem 1.5rem 1.25rem;flex-shrink:0;border-top:1px solid var(--border)}
.btn-secondary{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:.65rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer;transition:border-color .18s,color .18s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:.65rem 1.25rem;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);z-index:400;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.skeleton-cover{aspect-ratio:3/4}
.skeleton-body{padding:.85rem;display:flex;flex-direction:column;gap:.5rem}
.skeleton-line{height:12px}
.skeleton-btn{height:34px;margin-top:.25rem}
.empty{text-align:center;padding:5rem 1rem;color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;grid-column:1/-1}
.error-msg{text-align:center;padding:3rem 1rem;color:#e07070;font-family:'DM Mono',monospace;font-size:.82rem;line-height:1.8;grid-column:1/-1}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" id="logoHome">Biblio<span>teca</span></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar por título, autor o categoría…">
    </div>
    <div class="stats"><b id="totalCount">…</b> títulos</div>
  </div>
</header>

<nav class="nav-bar">
  <div class="nav-inner" id="navInner">
    <!-- Se genera por JS -->
  </div>
</nav>

<main>
  <div class="section-header">
    <h2 class="section-title">Colección</h2>
    <span class="section-count" id="sectionCount">cargando…</span>
  </div>
  <div class="books-grid" id="booksGrid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-cover"><img id="modalCover" src="" alt=""></div>
      <div class="modal-meta">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalCat" class="modal-cat"></div>
        <div class="modal-detail">Tomos: <span id="modalVolCount"></span><br>Descargas: <span id="modalDl"></span></div>
      </div>
    </div>
    <div class="modal-vols">
      <div class="modal-vols-title">Archivos disponibles</div>
      <div id="modalVolsList"></div>
    </div>
    <div class="modal-close-row">
      <button class="btn-secondary" id="modalClose">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://biblioteca-production-0015.up.railway.app";
const PAGE_SIZE = 48;
let state = { page: 1, query: "", category: "" };
let totalBooks = 0;

// ── ESTRUCTURA DE GRANDES CATEGORÍAS ──────────────────────
const MENU = [
  { label: "Todos", cats: [] },
  { label: "🦸 EEUU", cats: [
    { label: "Marvel", main: "Marvel", subs: ["Spiderman","X-men","Venom","Marvel Deluxe","Marvel timeline","Marvel blood hunt","Marvel Ultimate Nuevo Arco","Marvel Ultimate (Colección Salvat)","Spiderman la colección definitiva salvat(30/60)","Enciclopedia Marvel (12/110)"] },
    { label: "DC", main: "DC", subs: ["Batman","Superman","Detective comics","Action comics","Justicie league of america vol 1","Batman Novaro","Superman novaro","DC KO","DC Absolute","Dc knigth terrors","HÉROES Y VILLANOS","Colección Novelas Gráficas DC Comics - 100 tomos (en proceso)"] },
    { label: "Image", main: "Image", subs: ["Spawn","Sweet Tooth"] },
    { label: "Dark Horse", main: "Dark Horse", subs: ["Hellboy","Alien / Depredador"] },
    { label: "IDW", main: "IDW", subs: ["Transformers(varias continuidades)","Star Trek","Power rangers","Godzilla","TMNT"] },
    { label: "Valiant", main: "Valiant", subs: [] },
    { label: "Dynamite", main: "Dynamite", subs: ["James Bond 007"] },
    { label: "Boom Studios", main: "Boom studios", subs: [] },
    { label: "Aftershock", main: "Aftershock", subs: [] },
    { label: "Vértigo", main: "Vértigo", subs: ["Colección Vertigo, Editorial Norma (292 tomos)"] },
    { label: "MILLARWORLD", main: "MILLARWORLD", subs: [] },
    { label: "MASSIVE-VERSE", main: "MASSIVE-VERSE", subs: [] },
    { label: "Otras", main: null, subs: ["The Boys (completa en orden de lectura)","Zenescope","Editorial Avatar","Archie","Grimm fairy tales"] },
  ]},
  { label: "🌍 Europa", cats: [
    { label: "Franco Belga", main: "Franco Belga", subs: ["Spirou","ASTÉRIX Y OBÉLIX","Elf Quest","Elfquest","Tierras de Arran","Los maestros inquisidores"] },
    { label: "España", main: "España", subs: ["Mortadelo y Filemon","Zipi y Zape (SALVAT) - Edición coleccionista 43/61","Principe Valiente 75/75 Ed.Planeta deAgostini","Revistas comic Españolas","Revista Dolmen","Revista Cimoc","Revisa el Jueves (y otras de la editorial)","Historias de España en vinetas","Super López"] },
    { label: "Europeo general", main: "Europeo", subs: ["Dylan Dog","Alan Moore","Neil Gaiman 🎻","Juez dreed"] },
    { label: "2000 AD", main: "2000 AD", subs: [] },
  ]},
  { label: "🇦🇷 Latinoamérica", cats: [
    { label: "Argentina", main: "Argentina", subs: ["Robin Wood","Revistas Argentinas","Revista Fierro","Revista Skorpio","Revista Anteojito","Revista Hortensia (incompleta)","Suplemento hora cero (semanal)","Fontanarrosa","Quino","Caloi","El Eternauta","Patoruzu","Quique Alcatena"] },
    { label: "Chile", main: "Chile", subs: ["Alejandro Jodorowsky","Condorito"] },
    { label: "México", main: "México", subs: ["Kaliman","Fantomas (méxico)","Superman novaro","Batman Novaro","Revista Duda (México)","Revista Chanoc"] },
    { label: "Latinoamericano", main: "Latinoamericano", subs: ["Leo (Luiz Eduardo de Oliveira)"] },
  ]},
  { label: "🇯🇵 Manga", cats: [
    { label: "Manga", main: "Manga", subs: ["Dragón ball","Naruto","Pokémon","Clasicos en Manga"] },
    { label: "Manhwa (coreano)", main: "Manhwa", subs: [] },
    { label: "Asiático no manga", main: "Asiático (no manga)", subs: [] },
  ]},
  { label: "⭐ Temáticas", cats: [
    { label: "Star Wars", main: "Star Wars", subs: [] },
    { label: "Star Trek", main: "Star Trek", subs: [] },
    { label: "Terror", main: "Terror", subs: [] },
    { label: "D&D / Magic", main: null, subs: ["Dungeon & Dragons","Magic: The gathering","Pathfinder"] },
    { label: "Humor / Infantil", main: null, subs: ["Los simpsons","Disney","Archie","Libros infantiles ilustrados (no comics)"] },
    { label: "Otros", main: null, subs: ["Planeta de los simios","Godzilla","Warhammer","Albumes de figuritas"] },
  ]},
  { label: "🎨 Arte", cats: [
    { label: "Artbooks", main: "Artbooks", subs: [] },
    { label: "Técnicas de dibujo", main: "Tecnicas de dibujo", subs: [] },
    { label: "imagine FX", main: "imagine FX (revista de dibujo y mas)", subs: [] },
    { label: "Historia de los cómics", main: "Historia de los comics", subs: [] },
  ]},
  { label: "📚 Especiales", cats: [
    { label: "Biografías", main: null, subs: ["Biografias","Biografias - historicos - no ficción"] },
    { label: "Investigación", main: "Investigación, Informes, Tesis, Proyectos", subs: [] },
    { label: "Revistas", main: null, subs: ["Revistas","Revistas sobre comics","Revista ecc"] },
    { label: "Otros", main: null, subs: ["Pedidos","En ingles (pedidos no encontrados en Español)"] },
  ]},
];

// ── HELPERS ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function formatSize(b) {
  if (!b) return "—";
  const m = b / 1024 / 1024;
  return m < 1 ? Math.round(b / 1024) + " KB" : m.toFixed(1) + " MB";
}

function setCategory(cat) {
  state.category = cat;
  state.page = 1;
  updateNavActive();
  loadBooks();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateNavActive() {
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".drop-item").forEach(b => b.classList.remove("active"));
  if (!state.category) {
    const t = document.querySelector(".nav-btn[data-cat='']");
    if (t) t.classList.add("active");
    return;
  }
  document.querySelectorAll(".drop-item[data-cat]").forEach(b => {
    if (b.dataset.cat === state.category) b.classList.add("active");
  });
}

// ── CONSTRUYE EL NAV con submenús anidados ────────────────
function buildNav() {
  const nav = document.getElementById("navInner");
  nav.innerHTML = "";

  MENU.forEach(group => {
    const item = document.createElement("div");
    item.className = "nav-item";

    if (!group.cats || group.cats.length === 0) {
      item.innerHTML = `<button class="nav-btn solo" data-cat="">${group.label}</button>`;
      item.querySelector(".nav-btn").addEventListener("click", () => setCategory(""));
    } else {
      const btn = document.createElement("button");
      btn.className = "nav-btn";
      btn.innerHTML = `${group.label} <span class="arrow">▾</span>`;

      const drop = document.createElement("div");
      drop.className = "dropdown";

      group.cats.forEach(section => {
        if (section.subs && section.subs.length > 0) {
          // Entrada con submenú anidado
          const parent = document.createElement("div");
          parent.className = "drop-parent";

          const mainBtn = document.createElement("button");
          mainBtn.className = "drop-item";
          mainBtn.textContent = section.label;
          if (section.main) {
            mainBtn.dataset.cat = section.main;
            mainBtn.addEventListener("click", () => setCategory(section.main));
          }
          parent.appendChild(mainBtn);

          const subDrop = document.createElement("div");
          subDrop.className = "subdropdown";

          section.subs.forEach(cat => {
            const s = document.createElement("button");
            s.className = "drop-item";
            s.dataset.cat = cat;
            s.textContent = cat;
            s.addEventListener("click", () => setCategory(cat));
            subDrop.appendChild(s);
          });

          parent.appendChild(subDrop);
          drop.appendChild(parent);
        } else {
          // Entrada simple sin submenú
          const d = document.createElement("button");
          d.className = "drop-item";
          d.textContent = section.label;
          if (section.main) {
            d.dataset.cat = section.main;
            d.addEventListener("click", () => setCategory(section.main));
          }
          drop.appendChild(d);
        }
      });

      item.appendChild(btn);
      item.appendChild(drop);
    }

    nav.appendChild(item);
  });

  updateNavActive();
}

// ── RENDER ────────────────────────────────────────────────
function renderSkeletons(n = 12) {
  document.getElementById("booksGrid").innerHTML = Array(n).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-cover skeleton"></div>
      <div class="skeleton-body">
        <div class="skeleton-line skeleton" style="width:80%"></div>
        <div class="skeleton-line skeleton" style="width:55%"></div>
        <div class="skeleton-btn skeleton"></div>
      </div>
    </div>`).join("");
}

function renderBooks(groups) {
  const grid = document.getElementById("booksGrid");
  if (!groups.length) { grid.innerHTML = '<div class="empty">No se encontraron títulos…</div>'; return; }
  window._groups = groups;

  grid.innerHTML = groups.map((g, i) => {
    const cover   = g.cover_msg_id ? `${API}/api/cover/${g.cover_msg_id}` : null;
    const vols    = g.volumes;
    const main    = vols[0];
    const isMulti = vols.length > 1;

    const coverHtml = cover
      ? `<img src="${cover}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>${main.title.replace(/['"<>]/g,"")}</div>'">`
      : `<div class="cover-placeholder">${main.title}</div>`;

    const catTag = g.category
      ? `<span class="tag cat" data-cat="${g.category}">${g.category}</span>`
      : "";

    const volsHtml = isMulti
      ? `<div class="volumes-list">
          ${vols.slice(0,3).map(v => `
            <div class="vol-item">
              <span class="vol-title">${v.title}</span>
              <button class="vol-btn" data-id="${v.id}" data-title="${v.title.replace(/"/g,"&quot;")}">↓</button>
            </div>`).join("")}
          ${vols.length > 3 ? `<div class="vol-item ver-mas" data-group="${i}">+${vols.length-3} más…</div>` : ""}
        </div>`
      : `<button class="btn-download" data-id="${main.id}" data-title="${main.title.replace(/"/g,"&quot;")}">↓ Descargar</button>`;

    return `
      <div class="book-card" data-group="${i}" style="animation-delay:${i*.025}s">
        <div class="book-cover">
          ${coverHtml}
          <div class="book-badge">CBR</div>
          ${isMulti ? `<div class="vol-count">${vols.length} tomos</div>` : ""}
        </div>
        <div class="book-info">
          <div class="book-title">${isMulti ? vols.map(v=>v.title).join(" · ").substring(0,60)+"…" : main.title}</div>
          <div class="book-tags">
            ${catTag}
            ${!isMulti ? `<span class="tag">${formatSize(main.file_size)}</span>` : `<span class="tag">${vols.length} archivos</span>`}
          </div>
          ${volsHtml}
        </div>
      </div>`;
  }).join("");

  // Eventos
  grid.querySelectorAll(".tag.cat").forEach(tag => {
    tag.addEventListener("click", e => { e.stopPropagation(); setCategory(tag.dataset.cat); });
  });
  grid.querySelectorAll(".book-card").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.closest(".vol-btn,.btn-download,.tag.cat,.ver-mas")) return;
      openModal(+card.dataset.group);
    });
  });
  grid.querySelectorAll(".vol-btn,.btn-download").forEach(btn => {
    btn.addEventListener("click", e => { e.stopPropagation(); triggerDownload(+btn.dataset.id, btn.dataset.title, btn); });
  });
  grid.querySelectorAll(".ver-mas").forEach(el => {
    el.addEventListener("click", e => { e.stopPropagation(); openModal(+el.dataset.group); });
  });
}

function triggerDownload(id, title, btn) {
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }
  const a = document.createElement("a");
  a.href = `${API}/api/download/${id}`;
  a.download = ""; a.target = "_blank";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast(`↓ ${title}`);
  setTimeout(() => {
    if (btn) { btn.disabled = false; btn.innerHTML = btn.classList.contains("vol-btn") ? "↓" : "↓ Descargar"; }
  }, 3000);
}

function openModal(groupIdx) {
  const g = window._groups[groupIdx];
  if (!g) return;
  const cover = g.cover_msg_id ? `${API}/api/cover/${g.cover_msg_id}` : null;
  const img = document.getElementById("modalCover");
  img.src = cover || ""; img.style.display = cover ? "block" : "none";
  const title = g.volumes.length > 1
    ? g.volumes[0].title.replace(/\s*\d+\s*$/, "").trim() || g.volumes[0].title
    : g.volumes[0].title;
  document.getElementById("modalTitle").textContent = title;
  const catEl = document.getElementById("modalCat");
  catEl.textContent = g.category || "";
  catEl.style.display = g.category ? "inline-block" : "none";
  catEl.onclick = () => { document.getElementById("modalOverlay").classList.remove("open"); setCategory(g.category); };
  document.getElementById("modalVolCount").textContent = g.volumes.length;
  document.getElementById("modalDl").textContent = g.volumes.reduce((s,v) => s+(v.downloads||0), 0).toLocaleString();
  document.getElementById("modalVolsList").innerHTML = g.volumes.map((v,i) => `
    <div class="modal-vol-item">
      <span class="modal-vol-num">${i+1}</span>
      <span class="modal-vol-title">${v.title}</span>
      <span class="modal-vol-size">${formatSize(v.file_size)}</span>
      <button class="modal-vol-btn" data-id="${v.id}" data-title="${v.title.replace(/"/g,"&quot;")}">↓ Bajar</button>
    </div>`).join("");
  document.querySelectorAll(".modal-vol-btn").forEach(btn => {
    btn.addEventListener("click", () => triggerDownload(+btn.dataset.id, btn.dataset.title, btn));
  });
  document.getElementById("modalOverlay").classList.add("open");
}

document.getElementById("modalClose").onclick = () => document.getElementById("modalOverlay").classList.remove("open");
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove("open"); });

function renderPagination(total, pages) {
  const { page } = state;
  const el = document.getElementById("pagination");
  if (pages <= 1) { el.innerHTML = ""; return; }
  let nums = [];
  if (pages <= 7) nums = Array.from({length: pages}, (_,i) => i+1);
  else {
    nums = [1];
    if (page > 3) nums.push("…");
    for (let i = Math.max(2, page-1); i <= Math.min(pages-1, page+1); i++) nums.push(i);
    if (page < pages-2) nums.push("…");
    nums.push(pages);
  }
  el.innerHTML = `
    <button class="page-btn" ${page===1?"disabled":""} data-p="${page-1}">← Ant</button>
    ${nums.map(n => n==="…"
      ? `<span class="page-btn" style="cursor:default">…</span>`
      : `<button class="page-btn ${n===page?"active":""}" data-p="${n}">${n}</button>`
    ).join("")}
    <button class="page-btn" ${page===pages?"disabled":""} data-p="${page+1}">Sig →</button>`;
  el.querySelectorAll("[data-p]").forEach(b => b.addEventListener("click", () => {
    const p = +b.dataset.p;
    if (p >= 1 && p <= pages) { state.page = p; loadBooks(); window.scrollTo({top:0,behavior:"smooth"}); }
  }));
}

async function loadBooks() {
  renderSkeletons();
  updateNavActive();
  const params = new URLSearchParams({page: state.page, q: state.query, category: state.category});
  try {
    const res  = await fetch(`${API}/api/groups?${params}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (totalBooks > 0) document.getElementById("totalCount").textContent = totalBooks.toLocaleString();
    const from = ((state.page-1)*PAGE_SIZE)+1;
    const to   = Math.min(state.page*PAGE_SIZE, data.total);
    const label = state.category ? ` en ${state.category}` : state.query ? ` para "${state.query}"` : "";
    document.getElementById("sectionCount").textContent = `mostrando ${from}–${to} de ${data.total.toLocaleString()} grupos${label}`;
    renderBooks(data.results);
    renderPagination(data.total, data.pages);
  } catch(err) {
    document.getElementById("booksGrid").innerHTML = `<div class="error-msg">⚠ No se pudo conectar al servidor.<br><small>${err}</small></div>`;
  }
}

async function loadStats() {
  try {
    const data = await (await fetch(`${API}/api/stats`)).json();
    totalBooks = data.total_books || 0;
    document.getElementById("totalCount").textContent = totalBooks.toLocaleString();
  } catch {}
}

// Logo → home
document.getElementById("logoHome").addEventListener("click", () => {
  state.query = ""; state.category = ""; state.page = 1;
  document.getElementById("searchInput").value = "";
  loadBooks();
  window.scrollTo({top:0,behavior:"smooth"});
});

// Buscador
let searchTimer;
document.getElementById("searchInput").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const val = e.target.value.trim();
    // Busca si coincide con una categoría del menú
    let matchedCat = null;
    MENU.forEach(group => {
      group.cats && group.cats.forEach(section => {
        section.subs.forEach(cat => {
          if (cat.toLowerCase() === val.toLowerCase()) matchedCat = cat;
        });
      });
    });
    if (matchedCat && val !== "") {
      document.getElementById("searchInput").value = "";
      setCategory(matchedCat);
    } else {
      state.query = val;
      state.category = "";
      state.page = 1;
      loadBooks();
    }
  }, 400);
});

buildNav();
loadStats();
loadBooks();
</script>
